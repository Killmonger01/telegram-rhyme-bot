services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  bot:
    build: .
    command: node src/index.js
    env_file: .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  worker1:
    build: .
    command: node src/worker.js
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - WORKER_ID=1
    depends_on:
      - redis
    restart: unless-stopped

  worker2:
    build: .
    command: node src/worker.js
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - WORKER_ID=2
    depends_on:
      - redis
    restart: unless-stopped
